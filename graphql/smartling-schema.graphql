# ─── Visual Context Types ─────────────────────────────────────────────────────

type VisualContext {
  contextUid: ID!
  projectId: String!
  contextName: String!
  contextType: ContextType!
  uploadStatus: String!
  fileUri: String
  url: URI
  createdDate: DateTime!
  modifiedDate: DateTime!
  bindings: [ContextBinding!]!
}

type ContextBinding {
  bindingUid: ID!
  contextUid: String!
  stringHashcode: String!
  coordinates: ContextCoordinates
  createdDate: DateTime!
}

type ContextCoordinates {
  x: Float!
  y: Float!
  width: Float!
  height: Float!
}

# ─── Issue Types ──────────────────────────────────────────────────────────────

type Issue {
  issueUid: ID!
  projectId: String!
  issueType: IssueType!
  issueSeverity: IssueSeverity!
  issueStatus: IssueStatus!
  issueText: String!
  stringHashcode: String!
  localeId: String
  reportedByUserUid: String!
  resolvedByUserUid: String
  createdDate: DateTime!
  modifiedDate: DateTime!
  resolvedDate: DateTime
  comments: [IssueComment!]!
}

type IssueComment {
  commentUid: ID!
  issueUid: String!
  commentText: String!
