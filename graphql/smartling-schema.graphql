}

# ─── Machine Translation Types ────────────────────────────────────────────────

type MTEngine {
  mtEngineUid: ID!
  accountUid: String!
  engineName: String!
  engineType: MTEngineType!
  enabled: Boolean!
  supportedLocales: [String!]!
  createdDate: DateTime!
  modifiedDate: DateTime!
}

type MTTranslation {
  sourceText: String!
  translatedText: String!
  localeId: String!
  engineType: MTEngineType!
  score: Float
  processingTime: Int
}

# ─── Report Types ─────────────────────────────────────────────────────────────

type Report {
  reportUid: ID!
  projectId: String!
  reportType: String!
  reportName: String!
  status: String!
