  createdDate: DateTime!
}

# ─── Quality Check Types ──────────────────────────────────────────────────────

type QualityCheckProfile {
  profileUid: ID!
  projectId: String!
  profileName: String!
  checks: [QualityCheck!]!
  createdDate: DateTime!
  modifiedDate: DateTime!
}

type QualityCheck {
  checkUid: ID!
  checkType: String!
  enabled: Boolean!
  severity: QualityCheckSeverity!
  parameters: JSON
}

type QualityCheckResult {
  checkType: String!
  severity: QualityCheckSeverity!
  passed: Boolean!
  message: String
  details: JSON
}

type QualityCheckReport {
  reportUid: ID!
  projectId: String!
  jobUid: String
  localeId: String!
  totalStrings: Int!
  passedStrings: Int!
  failedStrings: Int!
