"""
Smartling GraphQL API Schema
Conceptual schema derived from the Smartling REST API for translation management.
Covers project management, file upload/download, translation jobs, glossary,
visual context, translation memory, and localization workflow automation.
Endpoint: https://api.smartling.com
Documentation: https://api-reference.smartling.com/
"""

# ─── Scalars ────────────────────────────────────────────────────────────────

scalar DateTime
scalar JSON
scalar Upload
scalar URI

# ─── Enums ──────────────────────────────────────────────────────────────────

enum FileType {
  ANDROID
  IOS
  GETTEXT
  HTML
  JAVAPROPERTIES
  JSON
  YAML
  XML
  XLIFF
  DOCX
  PPTX
  XLSX
  PDF
  CSV
  STRINGSDICT
  RESX
  SRT
  PLAINTEXT
  MADCAP
  FLSNP
  CUSTOM
}

enum TranslationState {
  NOT_STARTED
  IN_PROGRESS
  COMPLETED
  CANCELED
  EXCLUDED
}

enum JobStatus {
  DRAFT
  AWAITING_AUTHORIZATION
  IN_PROGRESS
  COMPLETED
  CANCELLED
  DELETED
}

enum WorkflowStatus {
  CREATED
  ACTIVE
  COMPLETED
  CANCELLED
  ARCHIVED
}

enum IssueType {
  TRANSLATION
  SOURCE
}

enum IssueSeverity {
  LOW
  MEDIUM
  HIGH
  CRITICAL
}

enum IssueStatus {
  OPENED
  RESOLVED
  REJECTED
}

enum GlossaryTermPartOfSpeech {
  NOUN
  VERB
  ADJECTIVE
  ADVERB
  PRONOUN
  PREPOSITION
  CONJUNCTION
  INTERJECTION
  OTHER
}

enum MTEngineType {
  GOOGLE
  MICROSOFT
  DEEPL
  AMAZON
  SYSTRAN
  MODERNMT
  SMARTCAT
  CUSTOM
}

enum QualityCheckSeverity {
  NONE
  LOW
  MEDIUM
  HIGH
  CRITICAL
}

enum ScheduleFrequency {
  DAILY
  WEEKLY
  MONTHLY
  CUSTOM
}

enum LocaleStatus {
  ACTIVE
  INACTIVE
}

enum ContextType {
  IMAGE
  HTML
  VIDEO
}

enum NotificationType {
  JOB_COMPLETED
  JOB_CANCELLED
  FILE_UPLOADED
  TRANSLATION_COMPLETED
  ISSUE_CREATED
  ISSUE_RESOLVED
  REVIEW_REQUESTED
  WORKFLOW_STEP_COMPLETED
}

# ─── Core Domain Types ────────────────────────────────────────────────────────

type Account {
  accountUid: ID!
  accountName: String!
  status: String!
  projects(first: Int, after: String): ProjectConnection!
  createdDate: DateTime!
  modifiedDate: DateTime!
}

type Project {
  projectId: ID!
  projectName: String!
  accountUid: String!
  sourceLocaleId: String!
  sourceLocaleDescription: String
  targetLocales: [Locale!]!
  archived: Boolean!
  projectType: String
  createdDate: DateTime!
  modifiedDate: DateTime!
  files(first: Int, after: String, filter: FileFilter): FileConnection!
  jobs(first: Int, after: String, filter: JobFilter): JobConnection!
  workflows: [Workflow!]!
  glossaries: [Glossary!]!
  strings(first: Int, after: String): StringConnection!
  translationMemories: [TranslationMemory!]!
  issues(first: Int, after: String, filter: IssueFilter): IssueConnection!
  reports: [Report!]!
  settings: ProjectSettings
}

type Locale {
  localeId: ID!
  description: String!
  enabled: Boolean!
  status: LocaleStatus!
  translationProgress: Float
  wordCount: Int
  stringCount: Int
}

type ProjectSettings {
  projectId: ID!
  machineTranslationEnabled: Boolean!
  autoAuthorizeEnabled: Boolean!
  queuedTranslationEnabled: Boolean!
  sourceLocaleId: String!
  targetLocaleIds: [String!]!
}

# ─── File Management ─────────────────────────────────────────────────────────

type File {
  fileUri: ID!
  projectId: String!
  fileType: FileType!
  fileName: String
  stringCount: Int
  wordCount: Int
  approvedStringCount: Int
  completedStringCount: Int
  excludedStringCount: Int
  lastUploaded: DateTime
  fileLocales: [FileLocale!]!
  directives: [FileDirective!]!
  callbackUrl: URI
  callbackMethod: String
}

type FileLocale {
  localeId: String!
  fileUri: String!
  lastModified: DateTime
  completedStrings: Int
  totalStrings: Int
  approvedStrings: Int
  excludedStrings: Int
  percentCompleted: Float
}

type FileDirective {
  key: String!
  value: String!
}

type FileUploadResult {
  fileUri: String!
  stringCount: Int!
  wordCount: Int!
  overWritten: Boolean!
  message: String
}

type FileDownloadResult {
  fileUri: String!
  localeId: String
  content: String!
  contentType: String!
}

type FileImportResult {
  wordCount: Int!
  stringCount: Int!
  translationImportErrors: [TranslationImportError!]!
}

type TranslationImportError {
  importKey: String!
  contentFileUri: String!
  errorDescription: String!
}

# ─── String & Translation Types ──────────────────────────────────────────────

type SourceString {
  hashcode: ID!
  fileUri: String!
  stringText: String!
  parsedStringText: String
  keys: [StringKey!]!
  variant: String
  format: String
  maxLength: Int
  instruction: String
  createdDate: DateTime!
  modifiedDate: DateTime!
  translations: [Translation!]!
  issues: [Issue!]!
}

type StringKey {
  key: String!
  fileUri: String!
  localeId: String
}

type Translation {
  hashcode: String!
  localeId: String!
  translationText: String!
  state: TranslationState!
  workflowStepType: String
  createdDate: DateTime!
  modifiedDate: DateTime!
  translator: User
  reviewer: User
  qualityChecks: [QualityCheckResult!]!
}

# ─── Job Types ────────────────────────────────────────────────────────────────

type TranslationJob {
  translationJobUid: ID!
  projectId: String!
  jobName: String!
  jobNumber: String
  description: String
  dueDate: DateTime
  status: JobStatus!
  targetLocaleIds: [String!]!
  callbackUrl: URI
  callbackMethod: String
  createdDate: DateTime!
  modifiedDate: DateTime!
  createdByUserUid: String
  modifiedByUserUid: String
  fileCount: Int
  stringCount: Int
  wordCount: Int
  files: [JobFile!]!
  batches: [JobBatch!]!
  schedule: JobSchedule
  customFields: [CustomField!]!
}

type JobFile {
  fileUri: String!
  localeIds: [String!]!
  wordCount: Int
  stringCount: Int
  status: TranslationState!
}

type JobBatch {
  batchUid: ID!
  status: String!
  fileCount: Int!
  stringCount: Int!
  wordCount: Int!
  createdDate: DateTime!
}

type JobSchedule {
  scheduleUid: ID!
  frequency: ScheduleFrequency!
  nextRunDate: DateTime
  lastRunDate: DateTime
  enabled: Boolean!
}

# ─── Workflow Types ───────────────────────────────────────────────────────────

type Workflow {
  workflowUid: ID!
  projectId: String!
  workflowName: String!
  description: String
  status: WorkflowStatus!
  steps: [WorkflowStep!]!
  createdDate: DateTime!
  modifiedDate: DateTime!
}

type WorkflowStep {
  stepUid: ID!
  stepName: String!
  stepType: String!
  order: Int!
  assigneeType: String
  assignees: [User!]!
  requiredTranslators: Int
  completionThreshold: Float
}

type WorkflowAssignment {
  assignmentUid: ID!
  workflowUid: String!
  stepUid: String!
  localeId: String!
  translator: User
  dueDate: DateTime
  status: String!
}

# ─── Glossary Types ───────────────────────────────────────────────────────────

type Glossary {
  glossaryUid: ID!
  accountUid: String!
  glossaryName: String!
  description: String
  localeIds: [String!]!
  termCount: Int!
  createdDate: DateTime!
  modifiedDate: DateTime!
  terms(first: Int, after: String, filter: GlossaryTermFilter): GlossaryTermConnection!
}

type GlossaryTerm {
  termUid: ID!
  glossaryUid: String!
  definition: String
  partOfSpeech: GlossaryTermPartOfSpeech
  notes: String
  caseSensitive: Boolean!
  exactMatch: Boolean!
  variations: [String!]!
  translations: [GlossaryTermTranslation!]!
  createdDate: DateTime!
  modifiedDate: DateTime!
}

type GlossaryTermTranslation {
  localeId: String!
  translatedTerm: String!
  notes: String
  locked: Boolean!
  forbidden: Boolean!
}

# ─── Translation Memory Types ─────────────────────────────────────────────────

type TranslationMemory {
  tmUid: ID!
  accountUid: String!
  tmName: String!
  description: String
  sourceLocaleId: String!
  targetLocaleIds: [String!]!
  segmentCount: Int!
  wordCount: Int!
